kind = "web"
previewPath = "/"
title = "Student Stat Stream"
version = "1.0.0"
id = "artifacts/student-stat"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 21370

[services.development]
run = "pnpm --filter @workspace/student-stat run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/student-stat", "run", "build" ]
publicDir = "artifacts/student-stat/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "21370"
BASE_PATH = "/"
